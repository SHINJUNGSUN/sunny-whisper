name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Swift Indicator (Universal)
        run: |
          cd NobsWhisperIndicator
          swift build -c release --arch arm64 --arch x86_64
          mkdir -p .build/release
          cp .build/apple/Products/Release/NobsWhisperIndicator .build/release/NobsWhisperIndicator

      - name: Build Tauri App
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          TAURI_CLI_CONFIG: '{"build":{"beforeBuildCommand":"npm run build"}}'

      - name: Create DMG
        run: |
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/Sunny's Whisper.app"
          DMG_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/SunnysWhisper_${{ github.ref_name }}_universal.dmg"

          hdiutil create -volname "Sunny's Whisper" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Sunny's Whisper ${{ github.ref_name }}"
          body: |
            ## Installation

            1. Download the `.dmg` file below
            2. Open the DMG and drag Sunny's Whisper to Applications
            3. Right-click the app → Open (first launch only, to bypass Gatekeeper)
            4. Grant Microphone and Accessibility permissions when prompted
            5. Download a Whisper model from the app
            6. Set your preferred hotkey and start transcribing!

            > **Note**: Apple Silicon (M1/M2/M3/M4) recommended for best performance.
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/SunnysWhisper_${{ github.ref_name }}_universal.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
